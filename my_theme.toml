#:schema https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

version = 2
final_space = true

# path
[[blocks]]
  type = 'prompt'
  alignment = 'left'
  # newline = true

  [[blocks.segments]]
    type = 'path'
    style = 'plain'
    template = ' ¯ù¥ {{ .Path }}'
    foreground = 'p:pink'
    Text = ''
    Duration = 0
    NameLength = 0

    [blocks.segments.properties]
      folder_icon = '¯ù¥'
      home_icon = '~'
      style = 'agnoster_full'

# [[blocks]]
#   type = 'prompt'
#   alignment = 'right'

  [[blocks.segments]]
    type = 'git'
    style = 'plain'
    template = ' {{ .HEAD }} '
    foreground = 'p:lavender'
    Text = ''
    Duration = 0
    NameLength = 0

    [blocks.segments.properties]
      branch_icon = '¯£Ñ '
      cherry_pick_icon = '¯èø '
      commit_icon = '´Éù '
      fetch_status = false
      fetch_upstream_icon = false
      merge_icon = '¯£º '
      no_commits_icon = '´ââ '
      rebase_icon = '¯£¿ '
      revert_icon = '´âó '
      tag_icon = '´ÉÆ '


# time, executiontime, language info
[[blocks]]
  type = 'prompt'
  alignment = 'right'
  # newline = true

  [[blocks.segments]]
    type = "python"
    style = "plain"
    foreground = "p:blue"
    template = "¯êÁ {{ .Venv }}"

  [[blocks.segments]]
    type = "go"
    style = "plain"
    template = " ¯ÿº {{ .Full }}"
    foreground = "p:blue"

  [[blocks.segments]]
    type = "rust"
    style = "plain"
    foreground = "p:rust"
    template = " ¾▒ÿù {{ .Full }}"

  [[blocks.segments]]
    type = 'executiontime'
    style = 'plain'
    foreground = 'yellow'
    background = 'transparent'
    template = ' ´ëô {{ .FormattedMs }}'

    [blocks.segments.properties]
      threshold = 500

  [[blocks.segments]]
    type = "time"
    style = "plain"
    foreground = "p:pink"

    [blocks.segments.properties]
      time_format = "15:04:05"

